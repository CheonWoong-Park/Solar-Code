name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not publish)'
        type: boolean
        default: true

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm run typecheck

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # for provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Dry run publish (check)
        run: |
          cd packages/cli && npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish oh-my-solar to npm
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          cd packages/core && npm publish --access public --provenance
          cd ../agents && npm publish --access public --provenance
          cd ../skills && npm publish --access public --provenance
          cd ../mcp-server && npm publish --access public --provenance
          cd ../cli && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # NEVER print NPM_TOKEN

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Oh My Solar ${{ github.ref_name }}

            Install:
            ```bash
            npm install -g oh-my-solar
            ```

            See [README.md](README.md) for full documentation.
